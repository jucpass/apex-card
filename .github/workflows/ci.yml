name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  install-lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate
      - name: Install dependencies
        run: pnpm install
      - name: Run ESLint
        run: pnpm lint
      - name: Run typecheck
        run: pnpm typecheck
      - name: Build all
        run: pnpm build
